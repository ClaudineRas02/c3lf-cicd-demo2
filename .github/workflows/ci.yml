name: CI + Livraison continue (Delivery)

on: [push]

# ─── VARIABLES ─────────────────────────────────────────
env:
  NODE_VERSION: "20"
  APP_VERSION: "1.2.0"

jobs:
  # ══ JOB 1 : lancer les tests ═══════════════════════
  tester:
    runs-on: ubuntu-latest # ← RUNNER

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" # ← CACHE : garde node_modules entre les runs

      - name: Installer les dépendances
        run: npm ci # plus rapide que npm install en CI

      - name: Lancer les tests
        run: npm run test:report # génère rapport-tests.json

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v4 # ← ARTEFACT (rapport)
        with:
          name: rapport-tests-v${{ env.APP_VERSION }}
          path: rapport-tests.json

  # ══ JOB 2 : builder (attend que tester réussisse) ══
  builder:
    needs: tester # ← séquence : builder attend tester
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" # ← CACHE réutilisé

      - run: npm ci

      - name: Construire l'application
        run: npm run build

      - name: Sauvegarder le build # ← ARTEFACT (livrable)
        uses: actions/upload-artifact@v4
        with:
          name: convertisseur-v${{ env.APP_VERSION }}
          path: dist/
